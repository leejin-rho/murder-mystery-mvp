# PR이 열리거나 업데이트될 때 Vercel 프리뷰 배포 (main ← 브랜치 PR)
# Production 워크플로와 동일한 Actions 시크릿 사용.
#
# 외부 포크에서 온 PR은 기본적으로 시크릿이 없어 스킵 (if 조건).

name: Vercel Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # package.json 의 packageManager(pnpm@9.14.2)만 사용 — version 키와 동시 지정 시 액션 에러
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          set +e
          OUT=$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}" 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          URL=$(printf '%s\n' "$OUT" | grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1)
          if [ -z "$URL" ]; then
            URL=$(printf '%s\n' "$OUT" | grep -Eo 'https://[^ ]+' | tail -1)
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          exit "$CODE"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `**Vercel preview:** ${{ steps.deploy.outputs.url }}`;
            const marker = "<!-- vercel-preview-bot -->";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user?.type === "Bot" && c.body?.includes(marker)
            );
            const text = `${marker}\n\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: text,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: text,
              });
            }
